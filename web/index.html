<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Blocker - UI Prototype</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      padding: 20px;
      height: 100vh;
    }

    #canvas-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }

    canvas, svg {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    #dev-tools {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 15px;
      overflow-y: auto;
      font-size: 12px;
    }

    .dev-section {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .dev-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .dev-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .dev-button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
    }

    .dev-button:hover {
      background: #0051D5;
    }

    .dev-button:last-child {
      margin-bottom: 0;
    }

    .dev-input {
      display: block;
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
    }

    .dev-log {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      max-height: 150px;
      overflow-y: auto;
      font-family: 'Monaco', monospace;
      font-size: 10px;
      color: #666;
    }

    .dev-log-entry {
      margin-bottom: 4px;
      padding: 2px 4px;
    }

    .dev-log-entry.error {
      color: #d32f2f;
    }

    .dev-log-entry.success {
      color: #388e3c;
    }
  </style>
</head>
<body>
  <main>
    <div id="canvas-container">
      <!-- Canvas or SVG will be rendered here -->
    </div>
    <aside id="dev-tools">
      <div class="dev-section">
        <h3>Render Mode</h3>
        <button class="dev-button" id="use-canvas">Use Canvas</button>
        <button class="dev-button" id="use-svg">Use SVG</button>
      </div>

      <div class="dev-section">
        <h3>Controls</h3>
        <button class="dev-button" id="clear-btn">Clear</button>
        <button class="dev-button" id="reset-btn">Reset</button>
      </div>

      <div class="dev-section">
        <h3>Debug Log</h3>
        <div id="debug-log" class="dev-log"></div>
      </div>
    </aside>
  </main>

  <script type="module" src="/src/script.ts"></script>
</body>
</html>
