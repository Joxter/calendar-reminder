<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Blocker - UI Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8e8ea;
      color: #333;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      padding: 20px;
      height: 100vh;
    }

    /* Stage — centers the reminder-window mock */
    #stage {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(45deg, #dcdce0 0 12px, #d2d2d6 12px 24px);
      border-radius: 8px;
    }

    /* ---- Reminder window mock (dimensions set by script from layout.ts) ---- */
    #window {
      display: flex;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    #left-column {
      flex: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      transition: background-color 0.3s ease;
    }

    .slot { display: flex; flex-direction: column; }
    .slot-next { justify-content: flex-end; }

    .cal-name {
      font-size: 10px; font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .next-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.9);
    }
    .slot-title {
      font-size: 15px; font-weight: 700; line-height: 1.21;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .slot-selected .slot-title { color: #fff; }
    .slot-next .slot-title { color: rgba(255, 255, 255, 0.9); }
    .slot-info {
      font-size: 11px; color: rgba(255, 255, 255, 0.7); margin-top: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .countdown {
      font: 900 52px/1 ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
      font-variant-numeric: tabular-nums;
      color: #fff; margin-top: -1px; margin-left: -4px;
    }
    .colon { animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .all-clear { font-size: 15px; font-weight: 700; color: #fff; }

    #right-column {
      flex: 1;
      background: #fff;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    #date-header { font-weight: 700; color: #000; }
    #timeline { display: block; cursor: default; }

    /* ---- Dev tools (pure HTML inputs) ---- */
    #dev-tools {
      background: white; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 15px; overflow-y: auto; font-size: 12px;
    }
    .dev-section { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .dev-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .dev-section h3 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: #666; margin-bottom: 8px;
    }
    .mock-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .mock-row label { cursor: pointer; }
    .dev-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dev-row input[type="number"] { width: 64px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; }
    .dev-row input[type="range"] { flex: 1; }
    .dev-button {
      display: block; width: 100%; padding: 8px 12px; margin-bottom: 6px;
      background: #007aff; color: white; border: none; border-radius: 4px;
      cursor: pointer; font-size: 11px; font-weight: 500;
    }
    .dev-button:hover { background: #0051d5; }
    .dev-log {
      background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px;
      padding: 8px; max-height: 150px; overflow-y: auto;
      font-family: 'Monaco', monospace; font-size: 10px; color: #666;
    }
    .dev-log-entry { margin-bottom: 4px; padding: 2px 4px; }
    .dev-log-entry.error { color: #d32f2f; }
    .dev-log-entry.success { color: #388e3c; }
  </style>
</head>
<body>
  <main>
    <div id="stage">
      <div id="window">
        <div id="left-column"></div>
        <div id="right-column">
          <div id="date-header"></div>
          <canvas id="timeline"></canvas>
        </div>
      </div>
    </div>

    <aside id="dev-tools">
      <div class="dev-section">
        <h3>Mock Events</h3>
        <div id="mock-events"></div>
      </div>

      <div class="dev-section">
        <h3>Simulated Time</h3>
        <div class="dev-row">
          <input type="range" id="time-range" min="-120" max="720" step="1" value="0" />
          <input type="number" id="time-offset" value="0" />
          <span>min</span>
        </div>
      </div>

      <div class="dev-section">
        <h3>Controls</h3>
        <button class="dev-button" id="reset-btn">Reset</button>
      </div>

      <div class="dev-section">
        <h3>Debug Log</h3>
        <div id="debug-log" class="dev-log"></div>
      </div>
    </aside>
  </main>

  <script type="module" src="/src/script.ts"></script>
</body>
</html>
